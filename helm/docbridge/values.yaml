# Default values for DocBridge Helm Chart.
# This is a YAML-formatted file.

environment: "dev"

# Global settings
global:
  imageRegistry: docbridgedevacr.azurecr.io
  imageTag: latest
  imagePullPolicy: Always
  nodeSelector:
    nodepool-type: application
  namespace: production

namespace:
  create: false
  name: production
  managedBy: gitops

azure:
  tenantId: ""
  workloadIdentityClientId: ""
  keyVaultName: ""

database:
  host: ""
  port: "5432"
  name: "docbridge_db"
  user: "docbridge_user"
  ssl: "true"

gateway:
  corsOrigin: ""
  azureOpenaiEndpoint: "https://docbridge-project1-resource.cognitiveservices.azure.com/"
  azureOpenaiDeploymentName: "gpt-4.1"
  azureOpenaiApiVersion: "2024-02-15-preview"

# Probes configuration
probes:
  liveness:
    path: /healthz
  readiness:
    path: /ready

# HPAs are disabled by default
hpa:
  enabled: false
  minReplicas: 1
  maxReplicas: 5
  targetCPUUtilizationPercentage: 80

# Microservices configuration
services:
  # Resource limits set to evaluation requirements.
  # Azure OpenAI calls are async HTTP so memory footprint
  # is manageable within 512Mi under normal load.
  # Increase limits in production if OOM kills are observed.
  ai-companion-service:
    port: 3007
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  api-gateway:
    port: 3000
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  auth-service:
    port: 3001
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  consultation-service:
    port: 3002
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  family-service:
    port: 3009
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  health-summary-service:
    port: 3008
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  labreport-service:
    port: 3005
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  prescription-service:
    port: 3003
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  reminder-service:
    port: 3004
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
  symptom-service:
    port: 3006
    replicas: 1
    resources:
      requests:
        memory: "128Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"

redis:
  replicas: 1
  image: redis:7-alpine
  port: 6379
  resources:
    requests:
      memory: "64Mi"
      cpu: "50m"
    limits:
      memory: "128Mi"
      cpu: "100m"
