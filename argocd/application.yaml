apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: docbridge
  namespace: argocd
spec:
  project: docbridge-project
  source:
    repoURL: 'https://github.com/Docbridge-devops-project/Docbridge-kubernetes.git'
    targetRevision: main
    path: helm/docbridge
    helm:
      valueFiles:
        - values.yaml
        - values.dev.yaml
      parameters:
        - name: azure.keyVaultName
          value: docbridge-dev-kv
        - name: azure.workloadIdentityClientId
          value: "f20c8a93-cb30-4391-b59e-796a90c4f936"
        - name: azure.tenantId
          value: "ffdb5413-63c8-40ec-a158-c5ad34880e3d"
        - name: database.host
          value: docbridge-dev-postgres-c.postgres.database.azure.com
        - name: gateway.corsOrigin
          value: "http://20.221.52.37"
        - name: image.tag
          value: "6a803d6"
        - name: global.imageTag
          value: "6a803d6"
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: production
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
